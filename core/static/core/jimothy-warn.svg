<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="jimothyTitle jimothyDesc">
  <title id="jimothyTitle">Jimothy</title>
  <desc id="jimothyDesc">A neon-outlined cartoon raccoon mascot standing upright with an exaggerated hunched, S-curved spine, wide eyes and a furrowed, concerned brow, one paw raised holding a tiny clipboard, glowing electric purple, magenta and cyan against a dark badge.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#232532"/>
      <stop offset="1" stop-color="#12111c"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#9184d9" stroke-width="1.5" opacity="0.5"/>

  <!-- tail -->
  <path d="M138 158 C 172 150, 178 118, 158 100 C 145 88, 128 96, 132 112 C 135 122, 148 122, 150 112"
        fill="none" stroke="#ff2fd0" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M138 158 C 172 150, 178 118, 158 100" fill="none" stroke="#00f0ff" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="6 10" opacity="0.8"/>

  <!-- hunched S-curve body/spine: the whole point of the bit -->
  <path d="M76 176
           C 60 176, 54 158, 66 148
           C 82 136, 96 140, 92 122
           C 88 104, 62 100, 66 80
           C 70 60, 96 50, 112 58
           C 124 64, 122 76, 110 80
           C 96 85, 92 96, 104 104
           C 122 114, 138 128, 128 148
           C 120 164, 96 176, 76 176 Z"
        fill="#3a1f66" stroke="#b026ff" stroke-width="3.5" filter="url(#glow)"/>

  <!-- glowing belly patch along the curve -->
  <path d="M84 168 C 74 160, 76 146, 90 140 C 78 128, 78 112, 92 100
           C 82 90, 84 74, 100 66"
        fill="none" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

  <!-- raised paw holding a tiny clipboard -->
  <path d="M118 100 C 132 92, 142 84, 140 72" fill="none" stroke="#b026ff"
        stroke-width="8" stroke-linecap="round"/>
  <rect x="130" y="56" width="20" height="26" rx="2" fill="#161826" stroke="#00f0ff" stroke-width="2" transform="rotate(-12 140 69)"/>
  <line x1="134" y1="63" x2="146" y2="61" stroke="#00f0ff" stroke-width="1.6" transform="rotate(-12 140 69)"/>
  <line x1="134" y1="68" x2="146" y2="66" stroke="#00f0ff" stroke-width="1.6" transform="rotate(-12 140 69)"/>
  <line x1="134" y1="73" x2="142" y2="72" stroke="#00f0ff" stroke-width="1.6" transform="rotate(-12 140 69)"/>

  <!-- other paw resting on ground -->
  <ellipse cx="68" cy="172" rx="9" ry="5.5" fill="#ff2fd0"/>
  <ellipse cx="118" cy="176" rx="9" ry="5.5" fill="#ff2fd0"/>

  <!-- head, tilted, alert -->
  <g transform="rotate(-8 100 46)">
    <ellipse cx="100" cy="46" rx="30" ry="26" fill="#3a1f66" stroke="#b026ff" stroke-width="3.5" filter="url(#glow)"/>
    <!-- ears -->
    <circle cx="78" cy="24" r="10" fill="#3a1f66" stroke="#b026ff" stroke-width="3"/>
    <circle cx="122" cy="24" r="10" fill="#3a1f66" stroke="#b026ff" stroke-width="3"/>
    <circle cx="78" cy="24" r="4.5" fill="#ff2fd0"/>
    <circle cx="122" cy="24" r="4.5" fill="#ff2fd0"/>
    <!-- bandit mask -->
    <path d="M72 40 Q100 30 128 40 Q126 54 100 56 Q74 54 72 40 Z" fill="#0d0a18"/>
    <!-- furrowed brow: two short inward-angled strokes just above the eyes,
         the one addition vs. the default face -->
    <line x1="81" y1="33" x2="90" y2="36.5" stroke="#f4f6ff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="119" y1="33" x2="110" y2="36.5" stroke="#f4f6ff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- big alert eyes, same shape as the default -->
    <circle cx="88" cy="42" r="9" fill="#f4f6ff"/>
    <circle cx="112" cy="42" r="9" fill="#f4f6ff"/>
    <circle cx="89" cy="43" r="4.5" fill="#1a0e2e"/>
    <circle cx="113" cy="43" r="4.5" fill="#1a0e2e"/>
    <circle cx="91" cy="41" r="1.4" fill="#00f0ff"/>
    <circle cx="115" cy="41" r="1.4" fill="#00f0ff"/>
    <!-- little nose -->
    <ellipse cx="100" cy="54" rx="4" ry="3" fill="#ff2fd0"/>
    <!-- small flat/concerned mouth line -->
    <line x1="93" y1="60" x2="107" y2="60" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- energy lines, neon crackle -->
  <path d="M150 44 q6 -4 4 -12" stroke="#00f0ff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M154 36 q5 -3 3 -10" stroke="#ff2fd0" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
